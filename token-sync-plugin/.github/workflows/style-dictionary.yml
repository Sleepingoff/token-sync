name: Style Dictionary Build

on:
  push:
    # Change branch filters if you only want this workflow on specific branches.
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      tokens_file:
        description: Token file path to transform
        required: false
        default: tokens.json

jobs:
  build-tokens:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # Change this if your plugin pushes the token document to a different repository path.
      DEFAULT_TOKENS_FILE: tokens.json
      # Change this if you want the generated files in a different output directory.
      STYLE_DICTIONARY_BUILD_PATH: build/tokens/
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Change the Node.js version only if your Style Dictionary toolchain requires it.
          node-version: 20
          cache: npm

      - name: Resolve token file
        id: resolve_tokens_file
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tokens_file }}" ]; then
            TOKENS_FILE="${{ inputs.tokens_file }}"
          else
            TOKENS_FILE="$DEFAULT_TOKENS_FILE"
          fi

          if [ ! -f "$TOKENS_FILE" ]; then
            echo "Token file not found: $TOKENS_FILE"
            exit 1
          fi

          echo "tokens_file=$TOKENS_FILE" >> "$GITHUB_OUTPUT"
          echo "Using token file: $TOKENS_FILE"

      - name: Install dependencies
        run: npm ci

      - name: Build Style Dictionary output
        env:
          TOKENS_FILE: ${{ steps.resolve_tokens_file.outputs.tokens_file }}
        run: npm run build:tokens -- --input "$TOKENS_FILE" --output "$STYLE_DICTIONARY_BUILD_PATH"

      - name: Upload transformed tokens artifact
        uses: actions/upload-artifact@v4
        with:
          # Change the artifact name if you want a different name in the Actions UI.
          name: style-dictionary-output
          path: build/tokens/
